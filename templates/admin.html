<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial; background: #1a1a2e; color: #eee; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 30px; color: #7c6af7; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
  .stat-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #2a2a4a; }
  .stat-card h3 { font-size: 14px; color: #6b6b9a; margin-bottom: 8px; }
  .stat-card .num { font-size: 28px; font-weight: bold; color: #7c6af7; }
  table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 10px; overflow: hidden; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2a4a; }
  th { background: #0f3460; color: #a8b4f8; font-size: 13px; }
  td { font-size: 14px; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 2px; }
  .btn-danger { background: #f76a6a; color: white; }
  .btn-success { background: #6af7a8; color: #1a1a2e; }
  .btn-warning { background: #f7c76a; color: #1a1a2e; }
  .actions { margin: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 Sudoku Admin Panel</h1>
  
  <div class="stats" id="stats"></div>
  
  <div class="actions">
    <button class="btn btn-success" onclick="createQuickTournament()">⚡ Tezkor turnir</button>
    <button class="btn btn-warning" onclick="createDailyTournament()">📅 Kunlik turnir</button>
    <button class="btn btn-danger" onclick="finishAllTournaments()">🔴 Barcha turnirlarni yakunlash</button>
  </div>
  
  <h3 style="margin: 20px 0 10px;">👥 TOP o'yinchilar</h3>
  <table id="topPlayers">
    <thead>
      <tr><th>#</th><th>Ism</th><th>Ochko</th><th>Tangalar</th><th>O'yinlar</th><th>Harakat</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  
  <h3 style="margin: 20px 0 10px;">🏆 Faol turnirlar</h3>
  <table id="tournaments">
    <thead>
      <tr><th>Nomi</th><th>Ishtirokchilar</th><th>Sovrin</th><th>Tugash</th><th>Harakat</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  async function loadStats() {
    const res = await fetch('/api/total-stats');
    const data = await res.json();
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><h3>Jami foydalanuvchilar</h3><div class="num">${data.total_users}</div></div>
      <div class="stat-card"><h3>Jami o'yinlar</h3><div class="num">${data.total_games}</div></div>
      <div class="stat-card"><h3>G'alabalar</h3><div class="num">${data.total_wins}</div></div>
    `;
  }
  
  async function loadTopPlayers() {
    const res = await fetch('/api/top');
    const players = await res.json();
    const tbody = document.querySelector('#topPlayers tbody');
    tbody.innerHTML = players.map((p, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${p.first_name || '@'+p.username}</td>
        <td>${p.total_score}</td>
        <td>${p.coins}</td>
        <td>${p.total_games}</td>
        <td>
          <button class="btn btn-warning" onclick="addCoins(${p.user_id})">+100 tanga</button>
          <button class="btn btn-danger" onclick="banUser(${p.user_id})">Ban</button>
        </td>
      </tr>
    `).join('');
  }
  
  async function loadTournaments() {
    const res = await fetch('/api/tournaments');
    const tournaments = await res.json();
    const tbody = document.querySelector('#tournaments tbody');
    tbody.innerHTML = '';
  }
  
  async function createQuickTournament() {
    await fetch('/api/admin/create-tournament', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: '⚡ Tezkor turnir', type: 'quick', hours: 1, entry: 25})
    });
    alert('Tezkor turnir yaratildi!');
    loadTournaments();
  }
  
  loadStats();
  loadTopPlayers();
  loadTournaments();
</script>
</body>
</html>
